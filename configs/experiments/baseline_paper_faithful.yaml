experiment:
  name: baseline_paper_faithful
  description: "Paper faithful baseline"

agent:
  model: "gpt-4o"
  instructions: |
    You are participating in an experimental market. 
    You are offered an asset. You don't know your exact position in the sequence. 
    Consider the price history and use the 'submit_decision' tool to buy or pass.

runner:
  fallback_action: no_buy
  max_retries: 2

treatments:
  - name: K1_capped
    cap_type: capped
    price_path: [1, 10]
    max_price: 10
    episodes: 15
  - name: K100_capped
    cap_type: capped
    price_path: [1, 10, 100]
    max_price: 100
    episodes: 15
  - name: K10000_capped
    cap_type: capped
    price_path: [1, 10, 100, 1000, 10000]
    max_price: 10000
    episodes: 15
  - name: Kinf_uncapped
    cap_type: uncapped
    price_path: [1, 10, 100, 1000, 10000, 100000]
    max_price: null
    episodes: 15

seeds:
  global_seed: 42
